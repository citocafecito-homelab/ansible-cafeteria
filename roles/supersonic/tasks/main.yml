- name: Install Dependencies
  become: true
  when: ansible_distribution_release not in ['Bazzite', 'Coreos', 'Kinoite', 'Silverblue']
  ansible.builtin.package:
    name:
      - mpv
      - "{{ 'libmpv2' if ansible_os_family == 'Debian' else 'mpv-libs' }}"
    state: present

- name: Install Dependencies (Atomic Mode)
  become: true
  when: ansible_distribution_release in ['Bazzite', 'Coreos', 'Kinoite', 'Silverblue']
  community.general.rpm_ostree_pkg:
    name:
      - mpv
      - mpv-libs
    state: present

- name: Get Latest Release Version
  ansible.builtin.uri:
    url: https://api.github.com/repos/dweymouth/supersonic/releases/latest
    return_content: true
    force: false
  register: supersonic_release_uri

- name: Set release tag
  ansible.builtin.set_fact:
    supersonic_uri: https://github.com/dweymouth/supersonic/releases/download
    supersonic_latest_tag: "{{ supersonic_release_uri.json.tag_name }}"
    supersonic_latest_name: "{{ supersonic_release_uri.json.name }}"
    supersonic_binary_path: /usr/local/bin/supersonic

- name: Ensure icon directories exist
  become: true
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - /tmp/supersonic
    - /usr/local/share/icons/hicolor/256x256/apps
    - /usr/local/share/pixmaps
    - /usr/local/share/applications

- name: Download Latest Version ({{ supersonic_latest_tag }})
  become: true
  register: supersonic_compressed
  ansible.builtin.get_url:
    url: "{{ supersonic_uri }}/{{ supersonic_latest_tag }}/Supersonic-{{ supersonic_latest_name }}-linux-x64-libmpv2.tar.xz"
    dest: "/tmp/supersonic.tar.xz"
    mode: '0644'
    force: false

- name: Extract Supersonic ({{ supersonic_latest_tag }})
  become: true
  ansible.builtin.unarchive:
    src: "{{ supersonic_compressed.dest }}"
    dest: /tmp/supersonic
    remote_src: true
    mode: '0755'
    creates: "/tmp/supersonic{{ supersonic_binary_path }}"

- name: Install Supersonic binary
  become: true
  ansible.builtin.copy:
    src: "/tmp/supersonic{{ supersonic_binary_path }}"
    dest: "{{ supersonic_binary_path }}"
    remote_src: true
    mode: "0755"

- name: Install Supersonic icon
  become: true
  ansible.builtin.copy:
    src: /tmp/supersonic/usr/local/share/pixmaps/.png
    dest: "{{ item }}"
    remote_src: true
    mode: "0644"
  loop:
    - /usr/local/share/icons/hicolor/256x256/apps/supersonic.png
    - /usr/local/share/pixmaps/supersonic.png

- name: Check Permissions
  become: true
  ansible.builtin.file:
    path: "{{ supersonic_binary_path }}"
    owner: root
    group: root
    mode: '0755'

- name: Create Desktop File
  become: true
  ansible.builtin.copy:
    dest: "/usr/local/share/applications/supersonic.desktop"
    owner: root
    group: root
    mode: '0644'
    content: |
      [Desktop Entry]
      Type=Application
      Name=Supersonic
      Exec="{{ supersonic_binary_path }}"
      Icon=supersonic
      Comment=A lightweight cross-platform desktop client for self-hosted music servers
      Categories=Audio;AudioVideo;
      Keywords=fyne;
