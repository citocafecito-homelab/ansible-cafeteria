name: Update Servers via Ansible
run-name: >-
  [Servers] Rolling out "${{ github.event.head_commit.message || 'Manual Build' }}" on ${{ github.ref_name }}

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - "**/**.md"
      - ".ansible-lint"
      - "!playbooks/main.yml"

jobs:
  main:
    runs-on: [self-hosted, arc, k8s]
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Install UV
        uses: astral-sh/setup-uv@v7.3.0
        with:
          enable-cache: "true"

      - name: Install Deps
        run: |
          uv venv
          uv pip install --group kubernetes
        env:
          UV_LINK_MODE: copy

      - name: Install Ansible Galaxy Tools
        run: uv run ansible-galaxy collection install -r requirements.yml

      - name: Setup Vault CLI
        uses: eLco/setup-vault@v1

      - name: Authenticate with Vault (OIDC)
        uses: hashicorp/vault-action@v4
        with:
          url: "http://vault.core.svc.cluster.local:8200"
          method: jwt
          role: "github-ansible-role"
          jwtGithubAudience: "https://github.com/citocafecito-homelab"
          exportToken: true

      - name: Ensure SSH client is installed
        run: |
          if ! command -v ssh >/dev/null; then
            sudo apt-get update
            sudo apt-get install -y openssh-client
          fi

      - name: Setup SSH and sign key via Vault
        env:
          VAULT_ADDR: "http://vault.core.svc.cluster.local:8200"
        run: |
          ##
          # SSH working directory
          ##
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          ##
          # SSH client configuration
          #
          # TrustedUserCAKeys must match the CA installed on target hosts
          ##
          cat <<EOF > ~/.ssh/config
          Host *
            StrictHostKeyChecking no
            IdentityFile ~/.ssh/id_barista
            CertificateFile ~/.ssh/id_barista-cert.pub
          EOF

          chmod 600 ~/.ssh/config

          ##
          # Generate ephemeral SSH keypair
          ##
          echo "[SSH] Generating RSA"
          ssh-keygen -t rsa -f ~/.ssh/id_barista -C "barista@citocafecito.work" -N "" -q

          ##
          # Request signed SSH certificate from Vault
          ##
          echo "[VAULT] Write Signer"
          vault write -field=signed_key ssh-client-signer/sign/ansible-role \
            public_key=@$HOME/.ssh/id_barista.pub \
            valid_principals=barista \
            extensions.permit-pty="" \
            extensions.permit-port-forwarding="" \
            ttl=30m \
            > ~/.ssh/id_barista-cert.pub

      - name: Run Ansible playbook
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          uv run ansible-playbook playbooks/main.yml \
            --user barista \
            --ssh-common-args="-F $HOME/.ssh/config"

      - name: Notify ntfy
        if: always()
        run: |
          # 1. Extraer metadata limpia del Commit y el entorno
          FULL_MSG="${{ github.event.head_commit.message || 'Ejecución Manual o re-run' }}"
          COMMIT_MSG=$(echo "$FULL_MSG" | head -n 1) # Toma solo la primera línea del mensaje
          AUTHOR="${{ github.event.head_commit.author.name || github.triggering_user }}"
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          REPO_URL="${{ github.server_url }}/${{ github.repository }}"
          
          # 2. Configurar alertas dinámicas según el estado
          if [ "${{ job.status }}" = "success" ]; then
            STATUS_TAGS="coffee,white_check_mark"
            STATUS_PRIORITY="default"
            RESULT_EMOJI="✅ SUCCESS"
          else
            STATUS_TAGS="coffee,x,rotating_light"
            STATUS_PRIORITY="high"
            RESULT_EMOJI="❌ FAILURE"
          fi

          # 3. Estructurar el reporte con formato limpio (removiendo espacios en blanco iniciales)
          REPORT_BODY=$(cat <<EOF
          Estatus: $RESULT_EMOJI
          Rama: ${{ github.ref_name }}
          Commit: $SHORT_SHA ($AUTHOR)
          
          Mensaje:
          "$COMMIT_MSG"
          EOF
          )

          # 4. Enviar a ntfy agregando botones de acción múltiples (Ver logs y Ver Repositorio)
          curl -s -o /dev/null -w "%{http_code}" \
               -H "Authorization: Bearer ${{ secrets.NTFY_TOKEN }}" \
               -H "Icon: https://cdn.jsdelivr.net/gh/selfhst/icons@main/png/github.png" \
               -H "Title: ${{ github.repository }}"" \
               -H "Tags: ${STATUS_TAGS}" \
               -H "Priority: ${STATUS_PRIORITY}" \
               -H "Actions: view, Ver Logs, ${RUN_URL}; view, Ir al Repo, ${REPO_URL}" \
               -d "$REPORT_BODY" \
               http://ntfy.core.svc.cluster.local/github-actions
